name: Build Oracle image

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ananta-dev-solutions/mosaic-oracle-custom-v21-we8
  RPM_URL: https://download.oracle.com/otn-pub/otn_software/db-express/oracle-database-xe-21c-1.0-1.ol8.x86_64.rpm
  RPM_SHA256: f8357b432de33478549a76557e8c5220ec243710ed86115c65b0c2bc00a848db

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare RPM in build context
        run: |
          mkdir -p infra/oracle-custom-v18/install
          curl -fL "${RPM_URL}" -o infra/oracle-custom-v18/install/oracle-database-xe-21c-1.0-1.ol8.x86_64.rpm
          echo "${RPM_SHA256}  infra/oracle-custom-v18/install/oracle-database-xe-21c-1.0-1.ol8.x86_64.rpm" | sha256sum -c -
          ls -lh infra/oracle-custom-v18/install/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: infra/oracle-custom-v18
          file: infra/oracle-custom-v18/Dockerfile.2130
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            
