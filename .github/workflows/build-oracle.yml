name: Build Oracle image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ananta-dev-solutions/mosaic-oracle-custom-v21-we8

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Buildx einrichten
        uses: docker/setup-buildx-action@v3

      # HIER deine Oracle-RPM beschaffen:
      # Beispiel: aus externer URL oder Release-Asset
      - name: Oracle RPM bereitstellen
        run: |
          mkdir -p infra/oracle-custom-v18/install
          echo "Hier Oracle-RPM herunterladen/kopieren"
          ls -la infra/oracle-custom-v18/install

      - name: Bei GHCR einloggen
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: infra/oracle-custom-v18
          file: infra/oracle-custom-v18/Dockerfile.2130
          push: true
          tags: ghcr.io/ananta-dev-solutions/mosaic-oracle-custom-v21-we8:latest
        
